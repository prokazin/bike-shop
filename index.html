<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Велосипед-сайт</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- ВЕСЬ САЙТ — ЭТО ВЕЛОСИПЕД -->
    <div class="bicycle">

        <!-- === ПЕРЕДНЕЕ КОЛЕСО === -->
        <div class="front-wheel">
            <div class="tire">
                <div class="rim">
                    <div class="hub"></div>
                    <div class="spoke s1"></div>
                    <div class="spoke s2"></div>
                    <div class="spoke s3"></div>
                    <div class="spoke s4"></div>
                    <div class="spoke s5"></div>
                    <div class="spoke s6"></div>
                    <div class="spoke s7"></div>
                    <div class="spoke s8"></div>
                    <div class="spoke s9"></div>
                    <div class="spoke s10"></div>
                    <div class="spoke s11"></div>
                    <div class="spoke s12"></div>
                </div>
            </div>
            <div class="wheel-label">🚲 КАТАЛОГ</div>
        </div>

        <!-- === РАМА === -->
        <div class="frame">

            <!-- Руль (навигация) -->
            <div class="handlebar">
                <div class="nav-links">
                    <a href="#" class="active" data-page="catalog">Каталог</a>
                    <a href="#" data-page="mountain">Горные</a>
                    <a href="#" data-page="road">Шоссейные</a>
                    <a href="#" data-page="electric">Электро</a>
                    <a href="#" data-page="kids">Детские</a>
                    <a href="#" data-page="accessories">Аксессуары</a>
                </div>
                <div class="brand-name">VELO</div>
            </div>

            <!-- Седло (информация) -->
            <div class="saddle">
                <div class="saddle-text">
                    <span class="year">с 2005</span>
                    <span class="slogan">велосипеды для жизни</span>
                </div>
            </div>

            <!-- Основное содержимое (рама) -->
            <div class="frame-content" id="mainContent">
                <!-- Товары загружаются через JS -->
            </div>

            <!-- Педали (футер) -->
            <div class="pedals">
                <div class="pedal left-pedal">
                    <span>© 2026</span>
                </div>
                <div class="pedal right-pedal">
                    <span class="admin-trigger" id="adminLink">🔧</span>
                </div>
            </div>

        </div>

        <!-- === ЗАДНЕЕ КОЛЕСО === -->
        <div class="rear-wheel">
            <div class="tire">
                <div class="rim">
                    <div class="hub"></div>
                    <div class="spoke s1"></div>
                    <div class="spoke s2"></div>
                    <div class="spoke s3"></div>
                    <div class="spoke s4"></div>
                    <div class="spoke s5"></div>
                    <div class="spoke s6"></div>
                    <div class="spoke s7"></div>
                    <div class="spoke s8"></div>
                    <div class="spoke s9"></div>
                    <div class="spoke s10"></div>
                    <div class="spoke s11"></div>
                    <div class="spoke s12"></div>
                </div>
            </div>
            <div class="wheel-label">🚲 АКЦИИ</div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
