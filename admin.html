<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Админ-панель</title>
    <link rel="stylesheet" href="admin-style.css" />
</head>
<body>
    <div class="admin-wrap">
        <div class="admin-panel">
            <div class="admin-head">
                <h1>🔧 Админ-панель</h1>
                <a href="index.html" class="back">← На сайт</a>
            </div>

            <div class="admin-stats">
                <div class="stat">
                    <span class="num" id="productCount">0</span>
                    <span class="label">Товаров</span>
                </div>
                <div class="stat">
                    <span class="num" id="totalSum">0 ₽</span>
                    <span class="label">Общая сумма</span>
                </div>
            </div>

            <div class="admin-form">
                <h2>Добавить товар</h2>
                <form id="addForm">
                    <input type="text" id="pName" placeholder="Название" required />
                    <input type="text" id="pBrand" placeholder="Бренд" />
                    <input type="number" id="pPrice" placeholder="Цена" required />
                    <input type="text" id="pEmoji" placeholder="Эмодзи" />
                    <button type="submit">Добавить</button>
                </form>
            </div>

            <div class="admin-list">
                <h2>Управление</h2>
                <div id="adminList"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
